name: Validate Codex Content

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node tools/validate-content.mjs
      - run: node tools/smoke-daily.mjs
      - run: node tools/smoke-settings.mjs
      - run: node tools/smoke-ui-v15.mjs
      - run: node tools/smoke-v18-learning.mjs
      - run: node tools/smoke-catalog-v181.mjs
      - run: node tools/smoke-v19-theory.mjs

      - run: node tools/smoke-v21-global.mjs

      - run: node tools/smoke-v211-rarity.mjs
