<!doctype html>
<html lang="ru" data-theme="night">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />
  <meta name="color-scheme" content="dark light" />
  <meta name="description" content="Codex of History — исторические кампании, уроки, карты и карточки" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Codex" />
  <title>Codex of History — v4.3.0</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="assets/ui/codex-app-icon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/ui/codex-favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/ui/codex-favicon-16.png" />
  <link rel="shortcut icon" href="assets/ui/codex-favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/ui/codex-icon-180.png" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="styles.css?v=4.3.0" />
</head>
<body>
  <noscript>Нужен JavaScript: приложение хранит прогресс локально и собирает экраны на клиенте.</noscript>
  <div class="ambient" aria-hidden="true"><i></i><i></i><i></i></div>
  <div id="app" class="app-shell"></div>
  <div id="toast-root" class="toast-root" aria-live="polite"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    (()=>{
      const build='4.3.0';
      const standalone=window.matchMedia?.('(display-mode: standalone)').matches||navigator.standalone===true;
      if(!standalone)return;
      document.documentElement.classList.add('pwa-standalone');
      const key='codex_pwa_runtime_build';
      if(localStorage.getItem(key)===build)return;
      localStorage.setItem(key,build);
      try{
        localStorage.removeItem('codex_history_visual_archive_v312');
        localStorage.removeItem('codex_history_visual_archive_v313');
      }catch{}
      if('caches'in window)caches.keys().then(keys=>Promise.all(keys.filter(k=>k.startsWith('codex-')&&!k.startsWith('codex-v4.3.0')).map(k=>caches.delete(k)))).catch(()=>{});
    })();
  </script>
  <script src="js/bootstrap.js?v=4.3.0"></script>
</body>
</html>
